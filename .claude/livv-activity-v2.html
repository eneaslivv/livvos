<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LIVV OS — Activity</title>
<link rel="stylesheet" href="livv-os-styles.css">
<style>
/* ───────────────────────────────────────────────────────────
   ACTIVITY · community + team pulse
   Built on the LIVV OS design tokens
   ─────────────────────────────────────────────────────────── */
.act-page { padding: 24px 32px 80px; max-width: 1320px; margin: 0 auto; }

/* Page header */
.act-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; margin-bottom: 22px;
}
.act-head h1 {
  margin: 0;
  font-size: 30px; font-weight: 300;
  letter-spacing: -0.03em; color: var(--os-fg-0);
  display: inline-flex; align-items: center; gap: 14px;
}
.act-live {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: rgba(118,146,104,0.13);
  color: var(--ok);
  border-radius: 999px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase;
  font-weight: 600;
}
.act-live .dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--ok);
  box-shadow: 0 0 0 3px rgba(118,146,104,0.18);
  animation: act-pulse 2s ease-in-out infinite;
}
@keyframes act-pulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(118,146,104,0.18); }
  50%     { box-shadow: 0 0 0 6px rgba(118,146,104,0.05); }
}
.act-head-meta {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--os-fg-2);
  display: inline-flex; align-items: center; gap: 14px;
}
.act-refresh {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--os-panel);
  border: 0.5px solid var(--os-border-2);
  border-radius: 999px;
  cursor: pointer;
  font-size: 11.5px; color: var(--os-fg-1);
  transition: all .2s var(--ios-ease);
}
.act-refresh:hover { background: var(--os-surface); color: var(--os-fg-0); }

/* Page layout — main + community sidebar */
.act-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 18px;
  align-items: start;
}

/* KPI strip */
.act-stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.act-stat {
  padding: 14px 16px;
  background: var(--os-panel);
  border: 0.5px solid var(--os-border-2);
  border-radius: 13px;
  display: flex; gap: 12px; align-items: flex-start;
  cursor: pointer;
  transition: all .25s var(--ios-ease);
  position: relative;
  overflow: hidden;
}
.act-stat:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); border-color: rgba(90,62,62,0.22); }
.act-stat-ic {
  width: 30px; height: 30px; border-radius: 9px;
  background: color-mix(in oklab, var(--c) 14%, var(--os-surface));
  color: var(--c);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.act-stat-body { flex: 1; min-width: 0; }
.act-stat-l {
  font-family: var(--font-mono); font-size: 9.5px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--os-fg-2);
  margin-bottom: 4px;
}
.act-stat-v {
  display: flex; align-items: baseline; gap: 8px;
}
.act-stat-num {
  font-size: 22px; font-weight: 300;
  letter-spacing: -0.025em; color: var(--os-fg-0);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.act-stat-num.delta-down { color: var(--err); }
.act-stat-num.delta-up { color: var(--ok); }
.act-stat-sub {
  font-size: 11px; color: var(--os-fg-2);
}
.act-stat-sub strong { color: var(--os-fg-1); font-weight: 500; font-family: var(--font-sans); }
.act-stat-spark {
  position: absolute;
  bottom: 6px; right: 8px;
  height: 14px;
  display: flex; align-items: flex-end; gap: 1.5px;
}
.act-stat-spark span {
  width: 3px; background: var(--c); opacity: 0.6;
  border-radius: 1px;
}

/* Team leaderboard */
.act-team {
  background: var(--os-panel);
  border: 0.5px solid var(--os-border-2);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 18px;
}
.act-team-head {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 18px;
  border-bottom: 1px dashed rgba(90,62,62,0.12);
}
.act-team-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--os-fg-2);
}
.act-team-meta {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 10.5px;
  color: var(--os-fg-3);
}
.act-team-toggle {
  width: 22px; height: 22px; border-radius: 6px;
  background: transparent; border: 0;
  color: var(--os-fg-3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.act-team-row {
  display: grid;
  grid-template-columns: 28px 28px minmax(0, 130px) 1fr auto auto 22px;
  gap: 12px;
  align-items: center;
  padding: 9px 18px;
  border-bottom: 1px solid var(--os-divider);
  transition: background .15s var(--ios-ease);
  cursor: pointer;
}
.act-team-row:last-child { border-bottom: 0; }
.act-team-row:hover { background: var(--os-surface); }
.act-team-rank {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--os-fg-3); text-align: right;
}
.act-team-row:first-of-type .act-team-rank,
.act-team-row.top .act-team-rank { color: var(--accent); font-weight: 600; }
.act-team-av {
  width: 24px; height: 24px; border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: #fff;
}
.act-team-name {
  font-size: 12.5px; color: var(--os-fg-0);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.act-team-bar {
  height: 5px;
  background: var(--os-surface-2);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.act-team-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--ok) 0%, color-mix(in oklab, var(--ok) 65%, var(--accent)) 100%);
  border-radius: 999px;
  transition: width .4s var(--ios-ease);
}
.act-team-row.idle .act-team-fill {
  background: color-mix(in oklab, var(--os-fg-3) 35%, var(--os-divider));
  opacity: 0.4;
}
.act-team-count {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--os-fg-0); font-weight: 500;
  text-align: right; min-width: 28px;
}
.act-team-row.idle .act-team-count { color: var(--os-fg-3); }
.act-team-delta {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--os-fg-3); letter-spacing: 0.04em;
  display: inline-flex; align-items: center; gap: 6px;
  min-width: 60px;
  justify-content: flex-end;
}
.act-team-delta .neg { color: var(--err); }
.act-team-delta .pos { color: var(--ok); }
.act-team-chev { color: var(--os-fg-3); }

/* Tabs + composer */
.act-tabs-row {
  display: flex; align-items: center; gap: 4px;
  padding: 14px 18px;
  background: var(--os-panel);
  border: 0.5px solid var(--os-border-2);
  border-radius: 14px 14px 0 0;
  border-bottom: 0;
}
.act-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  background: transparent; border: 0; cursor: pointer;
  font-size: 12.5px; font-weight: 500;
  color: var(--os-fg-2);
  border-radius: 999px;
  transition: all .2s var(--ios-ease);
}
.act-tab:hover { color: var(--os-fg-0); }
.act-tab.active {
  background: var(--os-ink); color: var(--livv-cream-50);
}
.act-tab-count {
  font-family: var(--font-mono); font-size: 9.5px;
  padding: 1px 6px; border-radius: 5px;
  background: var(--os-surface); color: var(--os-fg-2);
}
.act-tab.active .act-tab-count {
  background: rgba(255,255,255,0.16); color: var(--livv-cream-50);
}
.act-tabs-row-right { margin-left: auto; display: flex; gap: 6px; }
.act-filter-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  background: var(--os-surface);
  border: 0.5px solid var(--os-border-2);
  border-radius: 999px;
  font-size: 11px; color: var(--os-fg-1); cursor: pointer;
}
.act-filter-btn:hover { background: var(--os-surface-2); color: var(--os-fg-0); }

/* Composer */
.act-composer {
  background: var(--os-panel);
  border: 0.5px solid var(--os-border-2);
  border-top: 0;
  padding: 18px;
  display: flex; gap: 12px; align-items: flex-start;
  border-bottom: 1px dashed rgba(90,62,62,0.10);
}
.act-composer-av {
  width: 34px; height: 34px; border-radius: 999px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.act-composer-body { flex: 1; min-width: 0; }
.act-composer-input {
  display: block; width: 100%;
  border: 0; outline: none;
  background: transparent;
  font: inherit; font-size: 14px;
  color: var(--os-fg-0);
  resize: none;
  padding: 6px 0;
  min-height: 38px;
  font-family: var(--font-sans);
}
.act-composer-input::placeholder { color: var(--os-fg-3); }
.act-composer-tools {
  display: flex; align-items: center; gap: 4px;
  padding-top: 10px;
  margin-top: 6px;
  border-top: 1px dashed rgba(90,62,62,0.08);
}
.act-tool {
  width: 26px; height: 26px; border-radius: 7px;
  background: transparent; border: 0; cursor: pointer;
  color: var(--os-fg-2);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s var(--ios-ease);
}
.act-tool:hover { background: var(--os-surface); color: var(--os-fg-0); }
.act-tool-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: transparent;
  border: 0.5px solid var(--os-border-2);
  border-radius: 999px;
  font-size: 11px; color: var(--os-fg-1);
  cursor: pointer;
  margin-left: 4px;
}
.act-tool-chip:hover { background: var(--os-surface); }
.act-post-btn {
  margin-left: auto;
  padding: 7px 18px;
  background: var(--os-ink); color: var(--livv-cream-50);
  border: 0; border-radius: 999px;
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .2s var(--ios-ease);
}
.act-post-btn:hover { background: var(--wine); }
.act-post-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Feed */
.act-feed {
  background: var(--os-panel);
  border: 0.5px solid var(--os-border-2);
  border-top: 0;
  border-radius: 0 0 14px 14px;
  padding: 10px 0 14px;
}

.act-day-label {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px 10px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--os-fg-2); font-weight: 600;
}
.act-day-label::after {
  content: ''; flex: 1; height: 1px;
  background: var(--os-divider);
}

.act-item {
  display: grid;
  grid-template-columns: 34px 1fr auto;
  gap: 12px;
  padding: 11px 18px;
  align-items: flex-start;
  border-bottom: 1px solid var(--os-divider);
  transition: background .15s var(--ios-ease);
}
.act-item:last-child { border-bottom: 0; }
.act-item:hover { background: var(--os-surface-2); }
.act-item-av {
  width: 30px; height: 30px; border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #fff;
  flex-shrink: 0;
  position: relative;
  margin-top: 2px;
}
.act-item-av-mark {
  position: absolute;
  bottom: -2px; right: -2px;
  width: 14px; height: 14px;
  border-radius: 999px;
  background: var(--os-panel);
  display: flex; align-items: center; justify-content: center;
}
.act-item-av-mark.complete { color: var(--ok); }
.act-item-av-mark.message  { color: var(--sky); }
.act-item-av-mark.create   { color: var(--accent); }
.act-item-av-mark.status   { color: var(--purple); }

.act-item-body { min-width: 0; }
.act-item-text {
  font-size: 13px; line-height: 1.5;
  color: var(--os-fg-0);
}
.act-item-text strong { font-weight: 500; }
.act-item-text .verb {
  color: var(--os-fg-2); font-weight: 400;
  margin: 0 4px;
}
.act-item-text .obj {
  color: var(--os-fg-0); font-weight: 500;
}
.act-item-text .module-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 7px;
  background: color-mix(in oklab, var(--c) 12%, var(--os-surface));
  color: var(--c);
  border-radius: 999px;
  font-family: var(--font-mono); font-size: 9.5px;
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-left: 6px;
  font-weight: 600;
}
.act-item-meta {
  display: inline-flex; align-items: center; gap: 12px;
  margin-top: 7px;
  font-size: 11.5px; color: var(--os-fg-2);
}
.act-item-meta button {
  display: inline-flex; align-items: center; gap: 4px;
  background: transparent; border: 0;
  color: var(--os-fg-2); cursor: pointer;
  padding: 2px 0;
  font-size: 11.5px;
  transition: color .15s var(--ios-ease);
}
.act-item-meta button:hover { color: var(--os-fg-0); }
.act-item-meta .liked { color: var(--err); }

.act-item-time {
  font-family: var(--font-mono); font-size: 10.5px;
  color: var(--os-fg-3); letter-spacing: 0.04em;
  white-space: nowrap;
}

/* Update card with body */
.act-item-update {
  margin-top: 8px;
  padding: 11px 13px;
  background: var(--os-surface);
  border: 0.5px solid rgba(90,62,62,0.08);
  border-radius: 9px;
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--os-fg-1);
}
.act-item-update strong { color: var(--os-fg-0); font-weight: 500; }

/* Status change badges */
.act-status-from-to {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 5px;
  font-size: 11.5px;
}
.act-status-badge {
  padding: 2px 8px;
  border-radius: 5px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.06em;
  font-weight: 500;
}
.act-status-badge.b1 { background: var(--os-surface); color: var(--os-fg-2); }
.act-status-badge.b2 { background: rgba(118,146,104,0.13); color: var(--ok); }

/* Attachments */
.act-item-attach {
  display: inline-flex; align-items: center; gap: 7px;
  margin-top: 7px;
  padding: 7px 11px;
  background: var(--os-surface);
  border: 0.5px solid var(--os-border-2);
  border-radius: 8px;
  font-size: 11.5px; color: var(--os-fg-1);
  width: fit-content;
  cursor: pointer;
}
.act-item-attach:hover { background: var(--os-surface-2); }
.act-item-attach-ic {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--os-panel);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
}

/* Reactions */
.act-reactions {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 7px;
}
.act-reaction {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  background: var(--os-surface);
  border: 0.5px solid var(--os-border);
  border-radius: 999px;
  font-size: 11px;
  cursor: pointer;
  color: var(--os-fg-1);
  transition: all .2s var(--ios-ease);
}
.act-reaction:hover { background: var(--os-surface-2); }
.act-reaction.mine {
  background: var(--accent-soft);
  border-color: var(--accent-strong);
  color: #8b6a17;
  font-weight: 500;
}
.act-reaction-add {
  width: 20px; height: 20px; border-radius: 999px;
  background: transparent; border: 0.5px dashed var(--os-border-2);
  color: var(--os-fg-3);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.act-reaction-add:hover { color: var(--accent); border-color: var(--accent-strong); border-style: solid; }

/* ───── SIDEBAR (community + announcements) ───── */
.act-side {
  display: flex; flex-direction: column; gap: 12px;
  position: sticky; top: 16px;
}
.act-side-card {
  background: var(--os-panel);
  border: 0.5px solid var(--os-border-2);
  border-radius: 13px;
  overflow: hidden;
}
.act-side-head {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px dashed rgba(90,62,62,0.12);
}
.act-side-title {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12.5px; font-weight: 500;
  color: var(--os-fg-0);
}
.act-side-title-ic {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--os-surface);
  color: var(--os-fg-1);
  display: flex; align-items: center; justify-content: center;
}
.act-side-meta {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--os-fg-3);
}

.act-side-body { padding: 6px 8px 10px; }
.act-side-body.pad-more { padding: 12px 16px; }

/* Announcement */
.act-announce {
  padding: 14px 16px;
  background: linear-gradient(135deg, var(--accent-soft) 0%, var(--os-panel) 70%);
  border: 0.5px solid var(--accent-strong);
  border-radius: 13px;
  display: flex; flex-direction: column; gap: 8px;
}
.act-announce-eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 9.5px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent); font-weight: 600;
}
.act-announce-eyebrow .pulse {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(196,163,90,0.18);
  animation: act-pulse 2s ease-in-out infinite;
}
.act-announce-title {
  font-size: 14.5px; font-weight: 500;
  letter-spacing: -0.012em;
  color: var(--os-fg-0);
}
.act-announce-desc {
  font-size: 12px; line-height: 1.5;
  color: var(--os-fg-1);
}
.act-announce-foot {
  display: flex; align-items: center; gap: 10px;
  margin-top: 4px;
  font-size: 11px; color: var(--os-fg-2);
}
.act-announce-cta {
  margin-left: auto;
  padding: 5px 11px;
  background: var(--os-ink); color: var(--livv-cream-50);
  border: 0; border-radius: 999px;
  font-size: 11px; font-weight: 500;
  cursor: pointer;
}
.act-announce-cta:hover { background: var(--wine); }

/* Online / presence */
.act-presence-row {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  gap: 10px; align-items: center;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
}
.act-presence-row:hover { background: var(--os-surface); }
.act-presence-av {
  width: 24px; height: 24px; border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: #fff;
  position: relative;
}
.act-presence-status {
  position: absolute;
  bottom: -1px; right: -1px;
  width: 8px; height: 8px; border-radius: 999px;
  border: 1.5px solid var(--os-panel);
}
.act-presence-status.online { background: var(--ok); }
.act-presence-status.away   { background: var(--accent); }
.act-presence-status.off    { background: var(--os-fg-3); }
.act-presence-meta {
  display: flex; flex-direction: column; min-width: 0;
}
.act-presence-name {
  font-size: 12.5px; color: var(--os-fg-0);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.act-presence-doing {
  font-size: 10.5px; color: var(--os-fg-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.act-presence-time {
  font-family: var(--font-mono); font-size: 9.5px;
  color: var(--os-fg-3); letter-spacing: 0.05em;
}

/* Discussion threads */
.act-thread {
  display: flex; flex-direction: column; gap: 5px;
  padding: 10px 12px;
  border-radius: 9px;
  cursor: pointer;
  transition: background .15s var(--ios-ease);
}
.act-thread:hover { background: var(--os-surface); }
.act-thread-title {
  font-size: 12.5px; font-weight: 500;
  color: var(--os-fg-0);
  letter-spacing: -0.005em;
}
.act-thread-meta {
  display: flex; align-items: center; gap: 8px;

            </div>
            <span className={`act-client-status ${c.status}`}>
              {c.status === 'in' ? '● Live' : c.status === 'signed' ? '✓ Won' : 'away'}
            </span>
          </div>
        ))}
      </div>
    </section>

    <section className="act-side-card">
      <header className="act-side-head">
        <span className="act-side-title">
          <span className="act-side-title-ic"><OS_ICON name="chat" size={11}/></span>
          Discussions
        </span>
        <span className="act-side-meta">{THREADS.reduce((s,t)=>s+t.unread,0)} unread</span>
      </header>
      <div className="act-side-body">
        {THREADS.map(t => (
          <div key={t.id} className="act-thread">
            <div className="act-thread-title">{t.title}</div>
            <div className="act-thread-meta">
              <div className="act-thread-avs">
                {t.avs.map((a, i) => (
                  <span key={i} className="av" style={{ background: ['var(--accent)','var(--sky)','var(--pink)'][i % 3] }}>{a}</span>
                ))}
              </div>
              <span>{t.replies} replies · {t.when}</span>
              {t.unread > 0 && <span className="unread" style={{ marginLeft: 'auto' }}>{t.unread}</span>}
            </div>
          </div>
        ))}
      </div>
    </section>

    <section className="act-side-card">
      <header className="act-side-head">
        <span className="act-side-title">
          <span className="act-side-title-ic"><OS_ICON name="bookmark" size={11}/></span>
          Pinned
        </span>
      </header>
      <div className="act-side-body">
        {PINNED.map(p => (
          <div key={p.id} className="act-pinned">
            <span className="act-pinned-ic"><OS_ICON name={p.ic} size={12}/></span>
            <div className="act-pinned-body">
              <div className="act-pinned-title">{p.title}</div>
              <div className="act-pinned-text">{p.text}</div>
              <div className="act-pinned-meta">{p.when}</div>
            </div>
          </div>
        ))}
      </div>
    </section>
  </aside>
);

// ── APP ───────────────────────────────────────────────────────
// Use the same OS shell — but with a thinner sidebar of just module icons.
// We patch MODULES to include Activity as the active module.
const ACT_MODULES = (typeof MODULES !== 'undefined' ? MODULES : []).map(m => ({ ...m }));
if (!ACT_MODULES.find(m => m.id === 'activity')) {
  ACT_MODULES.unshift({ id: 'activity', icon: 'activity', label: 'Activity', badge: 3 });
}

const ActSidebar = () => (
  <aside className="sb" data-screen-label="Sidebar">
    <div className="sb-logo">L</div>
    <nav className="sb-rail">
      {ACT_MODULES.map(m => (
        <button key={m.id} className={`sb-item ${m.id === 'activity' ? 'active' : ''}`}>
          <OS_ICON name={m.icon} size={18}/>
          {m.badge > 0 && <span className="sb-badge">{m.badge}</span>}
          <span className="sb-tooltip">{m.label}</span>
        </button>
      ))}
    </nav>
    <div className="sb-avatar" title="Eneas">E</div>
  </aside>
);

const ActTopbar = () => (
  <header className="tb">
    <div className="crumbs">
      <span className="mod-chip">
        <span className="ic"><OS_ICON name="activity" size={11}/></span>
        Activity
      </span>
      <span className="sep">/</span>
      <span className="seg-active">Live feed</span>
    </div>
    <div className="tb-spacer"/>
    <button className="tb-search">
      <OS_ICON name="search" size={14}/>
      <span>Search updates, files, people…</span>
      <span className="kbd">⌘K</span>
    </button>
    <div className="tb-actions">
      <button className="tb-iconbtn" title="Notifications">
        <OS_ICON name="bell" size={15}/>
        <span className="dot">3</span>
      </button>
    </div>
    <button className="tb-new">
      <OS_ICON name="plus" size={13}/>
      New
    </button>
  </header>
);

const App = () => (
  <div className="os">
    <ActSidebar/>
    <div className="main">
      <ActTopbar/>
      <div className="scroll">
        <div className="act-page">
          <ActHeader/>
          <Stats/>
          <div className="act-grid">
            <div>
              <Team/>
              <Feed/>
            </div>
            <Sidebar/>
          </div>
        </div>
      </div>
    </div>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
