name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        # Pre-existing test/Deno errors should not block CI; scope strict
        # checks to source files only.
        run: |
          npx tsc --noEmit -p tsconfig.json 2>&1 | tee tsc.log || true
          if grep -E '^(App\.tsx|components/|context/|hooks/|lib/|pages/|types/)' tsc.log | grep -q 'error TS'; then
            echo "::error::TypeScript errors in source files"
            grep -E '^(App\.tsx|components/|context/|hooks/|lib/|pages/|types/)' tsc.log | grep 'error TS'
            exit 1
          fi
          echo "Source files typecheck clean."

      - name: Build
        run: npm run build
        env:
          # Vite needs these at build time. Provided as repo secrets; falls
          # back to placeholder so the build can complete in forks/PRs that
          # don't have access to secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
