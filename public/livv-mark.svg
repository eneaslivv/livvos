<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Livv mark — editorial "lv." monogram on ink, cream strokes, gold period.
       Replaces the v0 placeholder glyph. Matches the LIVV design tokens:
       ink #09090B · cream #FDFBF7 · gold #C4A35A. -->
  <rect width="180" height="180" rx="40" fill="#09090B"/>
  <!-- l -->
  <path d="M56 50 L56 124" stroke="#FDFBF7" stroke-width="11" stroke-linecap="round"/>
  <!-- v -->
  <path d="M82 74 L101 124 L120 74" stroke="#FDFBF7" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- gold period -->
  <circle cx="136" cy="118" r="7.5" fill="#C4A35A"/>
</svg>
