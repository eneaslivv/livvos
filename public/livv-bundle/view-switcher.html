<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ViewSwitcher — Livv Studio</title>
<link rel="icon" href="assets/icon-livv.svg" type="image/svg+xml">
<style>
  /* ─── Tokens (subset of Livv design system) ─── */
  :root {
    --livv-cream-50:  #FDFBF7;
    --livv-cream-100: #F5F2EB;
    --livv-cream-200: #E6E2D8;
    --livv-cream-300: #D6D1C7;
    --livv-cream-400: #A8A29A;
    --livv-cream-500: #78736A;
    --livv-cream-600: #52525B;
    --livv-cream-700: #3F3F46;
    --livv-cream-900: #09090B;
    --ease-soft: cubic-bezier(0.16, 1, 0.3, 1);
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.02), 0 8px 16px -4px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--livv-cream-50);
    font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
    color: var(--livv-cream-900);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 48px 24px;
    gap: 28px;
  }

  /* ─── Demo chrome ─── */
  .demo-eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(90,62,62,0.55);
    margin-bottom: -16px;
  }
  .demo-title {
    font-weight: 300; font-size: 32px; letter-spacing: -0.035em;
    margin: 0; text-align: center;
  }
  .demo-stage {
    background: #fff;
    border: 1px dashed var(--livv-cream-200);
    border-radius: 24px;
    padding: 60px 80px;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    min-width: 480px;
  }
  .demo-caption {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; color: var(--livv-cream-500);
    letter-spacing: 0.06em;
  }
  .demo-info {
    max-width: 520px; text-align: center;
    font-size: 13px; color: var(--livv-cream-600); line-height: 1.6;
  }

  /* ═══════════════════════════════════════════════════════════════════
     COMPONENT: ViewSwitcher
     Drop the styles below + the JSX into your codebase. Tokens used:
       --livv-cream-50/100/200/900, --ease-soft
     Each tab can carry its own --tone via inline style or CSS class.
     ═══════════════════════════════════════════════════════════════════ */

  .vsw {
    position: relative;
    display: inline-flex; align-items: stretch;
    padding: 3px;
    background: #fff;
    border: 1px solid var(--livv-cream-200);
    border-radius: 999px;
    box-shadow:
      var(--shadow-sm),
      inset 0 1px 0 rgba(255,255,255,0.6);
    --vsw-tone: var(--livv-cream-900);
  }
  .vsw-thumb {
    position: absolute;
    top: 3px; bottom: 3px;
    border-radius: 999px;
    background: var(--livv-cream-900);
    box-shadow:
      0 5px 14px -4px color-mix(in oklab, var(--vsw-tone) 55%, transparent),
      0 2px 4px -1px color-mix(in oklab, var(--vsw-tone) 40%, transparent),
      inset 0 1px 0 rgba(255,255,255,0.18);
    transition:
      left .5s var(--ease-soft),
      width .5s var(--ease-soft),
      background .35s var(--ease-soft),
      box-shadow .35s var(--ease-soft);
    pointer-events: none;
    z-index: 0;
  }
  .vsw-thumb-ring {
    position: absolute;
    top: 1px; bottom: 1px;
    border-radius: 999px;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    background: conic-gradient(from 0deg, #E8BC59, #769268, #6DBEDC, #F1ADD8, #E8BC59);
    filter: blur(8px);
    transition:
      left .5s var(--ease-soft),
      width .5s var(--ease-soft),
      opacity .4s var(--ease-soft);
  }
  .vsw:hover .vsw-thumb-ring { opacity: 0.4; animation: vsw-spin 4s linear infinite; }
  @keyframes vsw-spin { to { transform: rotate(360deg); } }

  .vsw-tab {
    position: relative; z-index: 1;
    width: 36px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 0; cursor: pointer;
    border-radius: 999px;
    transition: transform .3s var(--ease-soft), background .25s var(--ease-soft);
  }
  .vsw-tab:hover:not(.active) {
    background: color-mix(in oklab, var(--tone) 14%, var(--livv-cream-50));
  }
  .vsw-tab:hover .vsw-icon { transform: translateY(-1px) scale(1.1); }
  .vsw-tab.active .vsw-icon {
    transform: scale(1.05);
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.28));
  }
  .vsw-icon {
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform .35s var(--ease-soft), filter .25s var(--ease-soft);
    pointer-events: none;
  }
  .vsw-icon svg { display: block; width: 16px; height: 16px; }
  .vsw-tab:not(.active) .vsw-icon { filter: saturate(0.6); opacity: 0.5; }
  .vsw-tab:not(.active):hover .vsw-icon {
    filter: saturate(1.6) brightness(0.6) drop-shadow(0 1px 1px rgba(44,4,5,0.15));
    opacity: 1;
  }
  .vsw-tab:focus-visible {
    outline: 2px solid var(--tone);
    outline-offset: 2px;
  }

  /* Tooltip */
  .vsw-tooltip {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    display: flex; align-items: center; gap: 8px;
    padding: 8px 8px 8px 12px;
    background: var(--livv-cream-900);
    color: var(--livv-cream-50);
    border-radius: 10px;
    font-size: 12px; font-weight: 500;
    white-space: nowrap;
    opacity: 0; visibility: hidden;
    pointer-events: none;
    transition:
      opacity .22s var(--ease-soft),
      transform .22s var(--ease-soft),
      visibility .22s;
    z-index: 100;
    box-shadow:
      0 10px 30px -8px rgba(0,0,0,0.35),
      0 4px 8px -2px rgba(0,0,0,0.15);
  }
  .vsw-tooltip::before {
    content: '';
    position: absolute;
    top: -4px; left: 50%; transform: translateX(-50%) rotate(45deg);
    width: 8px; height: 8px;
    background: var(--livv-cream-900);
    border-radius: 1px;
  }
  .vsw-tt-label { font-weight: 600; letter-spacing: -0.005em; }
  .vsw-tt-sub { color: rgba(253,251,247,0.55); font-weight: 400; font-size: 11.5px; }
  .vsw-tt-kbd {
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(253,251,247,0.12);
    color: var(--livv-cream-50);
    border-radius: 5px;
    border: 1px solid rgba(253,251,247,0.18);
    font-weight: 500;
  }
  .vsw-tab:hover .vsw-tooltip,
  .vsw-tab:focus-visible .vsw-tooltip {
    opacity: 1; visibility: visible;
    transform: translateX(-50%) translateY(0);
    transition-delay: .15s;
  }
  .vsw-tab.active .vsw-tooltip { background: var(--tone); }
  .vsw-tab.active .vsw-tooltip::before { background: var(--tone); }
  .vsw-tab.active .vsw-tt-label { color: #fff; }
  .vsw-tab.active .vsw-tt-sub { color: rgba(255,255,255,0.7); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="demo-eyebrow">© Livv Studio · Component</div>
<h1 class="demo-title">ViewSwitcher</h1>
<p class="demo-info">
  Iconic, fully-rounded, animated calendar view switcher.
  Hover for tooltip · 1–5 keyboard shortcuts · animated thumb with conic-glow on hover · per-tab tone color.
</p>

<div class="demo-stage">
  <span class="demo-caption">Default state</span>
  <div id="root"></div>
  <span class="demo-caption">Hover any tab to see the tooltip · press 1-5</span>
</div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ─── Component contract ────────────────────────────────────────────
// <ViewSwitcher value={view} onChange={setView} />
//
// Each view item is defined in VIEW_DEFS below with:
//   id     — string used in `value`
//   tone   — hex color for the active thumb + hover tint
//   label  — display name in tooltip
//   sub    — short descriptor in tooltip
//   kbd    — single keypress shortcut
//
// Component handles: animated thumb, conic glow on hover, keyboard 1-5,
// ARIA tablist/tab/aria-selected, focus rings, drop-shadow on active icon.

const VIEW_DEFS = [
  { id: 'Day',   tone: '#E8BC59', label: 'Day',   sub: 'Hour by hour', kbd: '1' },
  { id: 'Week',  tone: '#6DBEDC', label: 'Week',  sub: '7 columns',    kbd: '2' },
  { id: 'Month', tone: '#769268', label: 'Month', sub: 'Full grid',    kbd: '3' },
  { id: 'Board', tone: '#F1ADD8', label: 'Board', sub: 'By status',    kbd: '4' },
  { id: 'List',  tone: '#5c1d18', label: 'List',  sub: 'Linear',       kbd: '5' },
];

// Per-view colored mini-illustration. When `active`, all fills swap to
// cream-50 so they contrast against the dark colored thumb.
function ViewIcon({ id, color, active }) {
  const c = active ? '#FDFBF7' : color;
  const cFaint = active ? 'rgba(253,251,247,0.35)' : `${color}55`;
  const cMid   = active ? 'rgba(253,251,247,0.65)' : `${color}99`;
  switch (id) {
    case 'Day':
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4.5" fill={c}/>
          <circle cx="12" cy="12" r="2.2" fill={active ? '#FFE7A6' : '#FFEAB0'} opacity={active ? 1 : 0.6}/>
          <g stroke={c} strokeWidth="1.8" strokeLinecap="round">
            <path d="M12 2.5v2.5M12 19v2.5M2.5 12h2.5M19 12h2.5M5.2 5.2l1.7 1.7M17.1 17.1l1.7 1.7M5.2 18.8l1.7-1.7M17.1 6.9l1.7-1.7"/>
          </g>
        </svg>
      );
    case 'Week':
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3"  y="14" width="2.6" height="6"  rx="1" fill={cFaint}/>
          <rect x="7"  y="10" width="2.6" height="10" rx="1" fill={cMid}/>
          <rect x="11" y="5"  width="2.6" height="15" rx="1" fill={c}/>
          <rect x="15" y="9"  width="2.6" height="11" rx="1" fill={cMid}/>
          <rect x="19" y="13" width="2.6" height="7"  rx="1" fill={cFaint}/>
        </svg>
      );
    case 'Month':
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="16" rx="2.5" fill={cFaint} stroke={c} strokeWidth="1.4"/>
          <path d="M3 10h18" stroke={c} strokeWidth="1.4"/>
          <rect x="6"    y="12.5" width="3" height="2.5" rx="0.6" fill={cMid}/>
          <rect x="10.5" y="12.5" width="3" height="2.5" rx="0.6" fill={c}/>
          <rect x="15"   y="12.5" width="3" height="2.5" rx="0.6" fill={cMid}/>
          <rect x="6"    y="16.5" width="3" height="2.5" rx="0.6" fill={cFaint}/>
          <rect x="10.5" y="16.5" width="3" height="2.5" rx="0.6" fill={cMid}/>
          <rect x="15"   y="16.5" width="3" height="2.5" rx="0.6" fill={cFaint}/>
          <circle cx="7.5"  cy="3.5" r="1" fill={c}/>
          <circle cx="16.5" cy="3.5" r="1" fill={c}/>
        </svg>
      );
    case 'Board':
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3"  y="4" width="5" height="16" rx="1.2" fill={cFaint}/>
          <rect x="3"  y="4" width="5" height="6"  rx="1.2" fill={c}/>
          <rect x="10" y="4" width="5" height="16" rx="1.2" fill={cFaint}/>
          <rect x="10" y="4" width="5" height="10" rx="1.2" fill={cMid}/>
          <rect x="17" y="4" width="4" height="16" rx="1.2" fill={cFaint}/>
          <rect x="17" y="4" width="4" height="3"  rx="1.2" fill={c}/>
        </svg>
      );
    case 'List':
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="14" rx="2" fill={cFaint}/>
          <circle cx="6.5" cy="9"    r="1.4" fill={c}/>
          <circle cx="6.5" cy="14"   r="1.4" fill={cMid}/>
          <circle cx="6.5" cy="18.5" r="0.9" fill={cMid} opacity="0.7"/>
          <path d="M10 9h9M10 14h7M10 18.5h5" stroke={c} strokeWidth="1.6" strokeLinecap="round"/>
        </svg>
      );
    default: return null;
  }
}

function ViewSwitcher({ value, onChange }) {
  const idx = Math.max(0, VIEW_DEFS.findIndex(v => v.id === value));
  const active = VIEW_DEFS[idx];

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const i = parseInt(e.key, 10);
      if (i >= 1 && i <= VIEW_DEFS.length) onChange(VIEW_DEFS[i - 1].id);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onChange]);

  return (
    <div className="vsw" role="tablist" aria-label="Calendar view" style={{'--vsw-tone': active.tone}}>
      <div
        className="vsw-thumb"
        style={{
          left: `calc(3px + ${idx} * (100% - 6px) / ${VIEW_DEFS.length})`,
          width: `calc((100% - 6px) / ${VIEW_DEFS.length})`,
          background: `linear-gradient(135deg, ${active.tone}, color-mix(in oklab, ${active.tone} 70%, #2C0405))`,
        }}
      />
      <div
        className="vsw-thumb-ring"
        aria-hidden
        style={{
          left: `calc(3px + ${idx} * (100% - 6px) / ${VIEW_DEFS.length})`,
          width: `calc((100% - 6px) / ${VIEW_DEFS.length})`,
        }}
      />
      {VIEW_DEFS.map((v) => {
        const isActive = v.id === value;
        return (
          <button
            key={v.id}
            role="tab"
            aria-selected={isActive}
            aria-label={`${v.label} view`}
            className={`vsw-tab ${isActive ? 'active' : ''}`}
            onClick={() => onChange(v.id)}
            style={{'--tone': v.tone}}
          >
            <span className="vsw-icon">
              <ViewIcon id={v.id} color={v.tone} active={isActive}/>
            </span>
            <span className="vsw-tooltip" role="tooltip">
              <span className="vsw-tt-label">{v.label}</span>
              <span className="vsw-tt-sub">{v.sub}</span>
              <kbd className="vsw-tt-kbd">{v.kbd}</kbd>
            </span>
          </button>
        );
      })}
    </div>
  );
}

function Demo() {
  const [view, setView] = useState('List');
  return <ViewSwitcher value={view} onChange={setView} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
