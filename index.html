<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2c0405" />
  <meta name="description" content="Project management, CRM & business operations" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
  <title>Eneas OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class', // Enabled manual toggling
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            // Redefining Zinc for "Warm Stone" (Light) and "Deep Black" (Dark)
            zinc: {
              50: '#FDFBF7',  // Cream White
              100: '#F5F2EB', // Light Beige
              200: '#E6E2D8', // Stone Border
              300: '#D6D1C7',
              400: '#A8A29A',
              500: '#78736A',
              600: '#52525B', // Standard Zinc for text balance
              700: '#3F3F46',
              800: '#27272A', // Dark Borders
              900: '#09090B', // DEEP CARD SURFACE (Almost Black)
              950: '#000000', // PURE BLACK BACKGROUND
            },
            // Remapping standard colors to fit the theme if needed, 
            // but keeping them mostly standard ensures accessibility.
            indigo: {
              500: '#6366f1',
              600: '#4f46e5',
              900: '#312e81', // For very dark accents
            },
            brand: {
              dark: '#2c0405',
              accent: '#822b2e',
              light: '#fffffa',
              cream: '#ede5d8',
              grey: '#f5f4f3'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #FDFBF7;
      /* Cream */
      color: #09090B;
      /* Deep Black Text */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .dark body {
      background-color: #000000;
      /* Pure Black */
      color: #EDEDED;
      /* Soft White Text */
    }

    /* Custom Scrollbar - Darker */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #E6E2D8;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #D6D1C7;
    }

    /* Dark mode scrollbar */
    .dark ::-webkit-scrollbar-thumb {
      background: #27272A;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #3F3F46;
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Utilities */
    .mask-image-linear-gradient {
      mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Slim, discreet scrollbar for sidebar nav and clients tree */
    .sidebar-thin-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(113, 113, 122, 0.35) transparent;
    }
    .sidebar-thin-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar-thin-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidebar-thin-scroll::-webkit-scrollbar-thumb {
      background-color: rgba(113, 113, 122, 0.35);
      border-radius: 9999px;
    }
    .sidebar-thin-scroll::-webkit-scrollbar-thumb:hover {
      background-color: rgba(113, 113, 122, 0.6);
    }
    .dark .sidebar-thin-scroll {
      scrollbar-color: rgba(161, 161, 170, 0.25) transparent;
    }
    .dark .sidebar-thin-scroll::-webkit-scrollbar-thumb {
      background-color: rgba(161, 161, 170, 0.25);
    }
    .dark .sidebar-thin-scroll::-webkit-scrollbar-thumb:hover {
      background-color: rgba(161, 161, 170, 0.5);
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .glass-card {
      background: rgba(255, 255, 250, 0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(44, 4, 5, 0.06);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      border-color: rgba(130, 43, 46, 0.15);
    }

    .dark .glass-card {
      background: rgba(9, 9, 11, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .dark .glass-card:hover {
      border-color: rgba(130, 43, 46, 0.25);
    }

    .gradient-border-light {
      position: relative;
      border-radius: 1rem;
    }

    .gradient-border-light::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 1rem;
      padding: 1px;
      background: linear-gradient(135deg, rgba(44, 4, 5, 0.1), rgba(130, 43, 46, 0.05), rgba(44, 4, 5, 0.02));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .dark .gradient-border-light::before {
      background: linear-gradient(135deg, rgba(130, 43, 46, 0.15), rgba(99, 102, 241, 0.05), rgba(130, 43, 46, 0.03));
    }

    @keyframes pulse-soft {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.1);
      }
    }

    .animate-pulse-soft {
      animation: pulse-soft 3s infinite ease-in-out;
    }

    /* Tiptap Editor Styles */
    .tiptap p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: #A8A29A;
      pointer-events: none;
      height: 0;
    }
    .dark .tiptap p.is-editor-empty:first-child::before {
      color: #52525B;
    }
    .tiptap ul[data-type="taskList"] {
      list-style: none;
      padding-left: 0;
    }
    .tiptap ul[data-type="taskList"] li {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .tiptap ul[data-type="taskList"] li > label {
      flex-shrink: 0;
      margin-top: 0.25rem;
    }
    .tiptap ul[data-type="taskList"] li > label input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: #10b981;
      cursor: pointer;
    }
    .tiptap ul[data-type="taskList"] li > div {
      flex: 1;
    }
    .tiptap ul[data-type="taskList"] li[data-checked="true"] > div {
      text-decoration: line-through;
      color: #A8A29A;
    }
    .tiptap blockquote {
      border-left: 3px solid #E6E2D8;
      padding-left: 1rem;
      color: #78736A;
    }
    .dark .tiptap blockquote {
      border-left-color: #3F3F46;
      color: #A8A29A;
    }
    .tiptap pre {
      background: #F5F2EB;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
    }
    .dark .tiptap pre {
      background: #18181B;
    }
    .tiptap hr {
      border: none;
      border-top: 1px solid #E6E2D8;
      margin: 1.5rem 0;
    }
    .dark .tiptap hr {
      border-top-color: #27272A;
    }
    .tiptap h1 { font-size: 1.875rem; font-weight: 700; margin: 1.5rem 0 0.75rem; }
    .tiptap h2 { font-size: 1.5rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
    .tiptap h3 { font-size: 1.25rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    .tiptap p { margin: 0.5rem 0; line-height: 1.7; }
    .tiptap ul, .tiptap ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .tiptap li { margin: 0.25rem 0; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
